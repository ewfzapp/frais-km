<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Frais Kilométriques - Service Express</title></head>
<body style="background:#020617; color:#fff; font-family:sans-serif; text-align:center; padding:50px;">
  <a href="https://service-express.org" style="color:#94a3b8; text-decoration:none;">← Retour au portail</a>
  <h1>🚗 Frais <span>Kilométriques</span></h1>
  <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; max-width:400px; margin:20px auto;">
    <label>KM annuels</label><br><input type="number" id="k" oninput="c()" style="padding:10px; width:100%; border-radius:10px;"><br><br>
    <div id="r" style="font-size:24px; color:#fb923c;">0 € réductibles</div>
  </div>
  <script>function c(){ let k=document.getElementById('k').value; document.getElementById('r').textContent=Math.round(k*0.4)+' € (est.)';}</script>
</body></html>
